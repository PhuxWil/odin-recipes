        <h1> Slushy Recipe</h1>
        <p>                          </p>
        <center><img src="https://imagesvc.meredithcorp.io/v3/mm/image?url=https%3A%2F%2Fpublic-assets.meredithcorp.io%2Fa59c79836d841cebc2ef7770d5d2ee30%2F1659403969watermelon%20slushie.jpg&w=596&h=399&c=sc&poi=face&q=60" width = "300" height = "300" alt = "A picture of a slushy"></center>

        <p>
            <ul>
                <h3>Ingredients</h3>
                <li>4 cups cubed seedless watermelon</li>
                <li>10 ice cubes</li>
                <li>⅓ cup fresh lime juice</li>
                <li>¼ cup white sugar</li>
                <li>⅛ teaspoon salt </li>
               

            </ul>
            <ol>
                <h3>Directions</h3>
                <li>Place watermelon and ice into a blender. Pour in lime juice, sugar, and salt. Blend until smooth.</li>



            </ol>
        </p>
